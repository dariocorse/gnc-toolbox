name: Bug report
description: Report a reproducible problem in gnc-toolbox
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please remove or anonymize private financial data before attaching files.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the command, relevant rule-file rows, and a small CSV sample when possible.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Paste `gnc-toolbox --version`.
    validations:
      required: false
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS, distro version, and GnuCash version.
    validations:
      required: false


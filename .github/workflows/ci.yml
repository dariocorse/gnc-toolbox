name: CI

on:
  push:
  pull_request:

jobs:
  build-test-package:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libcsv-dev \
            libglib2.0-dev \
            libgnucash-dev

      - name: Run tests
        run: make test

      - name: Build packages
        run: make package

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnc-toolbox-packages
          path: |
            build/package/*.tar.gz
            build/package/SHA256SUMS

